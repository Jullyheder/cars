{% extends 'base.html' %}

{% block title %}Novo Carro{% endblock %}

{% block content %}
  <h1>Novo Carro</h1>
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <table>
      {{ form.as_table }}
    </table>
    <button type="submit" class="btn-primary">Cadastrar</button>
  </form>
{% endblock %}
